

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true

    container_name: hrms-app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www

    env_file:
      - .env

    expose:
      - "9000"

  nginx:
    image: nginx:latest

    container_name: hrms-nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app