name: mobile
description: "Human Resource Management System"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ============================
  # State Management
  # ============================
  provider: ^6.1.5

  # ============================
  # Networking
  # ============================
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # ============================
  # Local Storage
  # ============================
  shared_preferences: ^2.5.5

  # ============================
  # SVG Support
  # ============================
  flutter_svg: ^2.2.1

  # ============================
  # Image Picker
  # ============================
  image_picker: ^1.2.0

  # ============================
  # Date & Time
  # ============================
  intl: ^0.20.2

  # ============================
  # Cached Network Images
  # ============================
  cached_network_image: ^3.4.1

  # ============================
  # Loading Animation
  # ============================
  flutter_spinkit: ^5.2.2

  # ============================
  # Toast Messages
  # ============================
  fluttertoast: ^9.1.0

  # ============================
  # Connectivity
  # ============================
  connectivity_plus: ^7.0.0

  # ============================
  # Internet Checker
  # ============================
  internet_connection_checker_plus: ^3.1.1

  # ============================
  # Permissions
  # ============================
  permission_handler: ^12.0.1

  # ============================
  # URL Launcher
  # ============================
  url_launcher: ^6.3.2

  # ============================
  # OTP Input
  # ============================
  pinput: ^6.0.2

  # ============================
  # Lottie Animations
  # ============================
  lottie: ^3.3.2

  # ============================
  # Shimmer Effect
  # ============================
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/